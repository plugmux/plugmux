<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Three input lines on the left -->
  <line x1="2" y1="5" x2="9" y2="5" />
  <line x1="2" y1="12" x2="9" y2="12" />
  <line x1="2" y1="19" x2="9" y2="19" />
  <!-- Converge to center node -->
  <line x1="9" y1="5" x2="12" y2="12" />
  <line x1="9" y1="19" x2="12" y2="12" />
  <!-- Single output line -->
  <line x1="12" y1="12" x2="22" y2="12" />
  <!-- Center node diamond -->
  <polygon points="12,8.5 15.5,12 12,15.5 8.5,12" fill="currentColor" stroke="currentColor" stroke-width="1.5" />
</svg>
